version: '3.9'

# Production deploy — self-hosted VPS senaryosu için referans
# Vercel + Railway kullanılırsa bu dosyaya gerek yok

services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: nakliye-api
    restart: unless-stopped
    env_file:
      - ../../.env
    ports:
      - '4000:4000'
    depends_on:
      - postgres
      - redis
    healthcheck:
      test:
        ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:4000/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: nakliye-web
    restart: unless-stopped
    env_file:
      - ../../.env
    ports:
      - '3000:3000'
    depends_on:
      - api

  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: nakliye-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nakliye-redis-prod
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}

  nginx:
    image: nginx:alpine
    container_name: nakliye-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web

volumes:
  postgres_data:
  redis_data:
